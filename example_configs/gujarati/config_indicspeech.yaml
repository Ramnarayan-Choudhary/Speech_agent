# Gujarati Configuration - IndicSpeech 2022 Local Dataset + LoRA GPU Training
model_id: openai/whisper-small
local_dataset_path: data/processed/gujarati
language: gujarati
language_code: gu
repo_name: whisper-gujarati-lora-indicspeech

n_train_samples: -1  # Use all available data
n_test_samples: -1

# LoRA Configuration
lora_config:
  use_lora: true
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  bias: "none"

# Training Hyperparameters (optimized for RTX 5000 Ada 32GB)
training_hp:
  push_to_hub: false
  hub_private_repo: false
  max_steps: 500
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 1e-3
  warmup_steps: 50
  gradient_checkpointing: true
  fp16: true
  eval_strategy: "steps"
  eval_steps: 100
  per_device_eval_batch_size: 16
  predict_with_generate: true
  generation_max_length: 128
  save_steps: 100
  logging_steps: 10
  load_best_model_at_end: true
  save_total_limit: 3
  metric_for_best_model: "wer"
  greater_is_better: false
  remove_unused_columns: false
  label_names: ["labels"]
