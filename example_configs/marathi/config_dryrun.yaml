# Marathi Configuration - GPU DRY RUN (tiny test to validate pipeline)
model_id: openai/whisper-small
dataset_id: mozilla-foundation/common_voice_17_0
language: marathi
language_code: mr
repo_name: whisper-marathi-lora-dryrun

n_train_samples: 10
n_test_samples: 5

# LoRA Configuration
lora_config:
  use_lora: true
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  bias: "none"

# Training Hyperparameters (minimal for dry run)
training_hp:
  push_to_hub: false
  hub_private_repo: false
  max_steps: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 1e-3
  warmup_steps: 2
  gradient_checkpointing: true
  fp16: true
  eval_strategy: "steps"
  eval_steps: 5
  per_device_eval_batch_size: 2
  predict_with_generate: true
  generation_max_length: 128
  save_steps: 5
  logging_steps: 1
  load_best_model_at_end: true
  save_total_limit: 1
  metric_for_best_model: "wer"
  greater_is_better: false
  remove_unused_columns: false
  label_names: ["labels"]
